version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: Sud@sql123
      MYSQL_DATABASE: studentdb

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - student-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pSud@sql123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  spring-app:
    build: .
    container_name: student-app

    depends_on:
      mysql:
        condition: service_healthy

    restart: on-failure

    ports:
      - "8080:8080"

    networks:
      - student-network

networks:
  student-network:

volumes:
  mysql-data:

